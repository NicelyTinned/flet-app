name: Build Flet Android App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger the build from the Actions tab

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java (Required by Flutter and Android SDK)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Set up the Android SDK Environment
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Flet works robustly with Python 3.10 or 3.11 for packaging

      # 5. Install global Python dependencies and Flet CLI
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 6. Execute the Flet compilation build command
      # The CLI automatically fetches the necessary Flutter tools on the fly
      - name: Build Android APK
        env:
          FLET_CLI_NO_RICH_OUTPUT: 1
        run: |
          flet build apk

      # 7. Upload the compiled .apk file as a GitHub artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flet-android-apk
          path: build/apk/*.apk
          retention-days: 7
